services:
  - type: web
    name: ai-agent-backend
    env: python
    region: oregon
    plan: free
    rootDir: AI-AGENT-SYSTEM-FULL-2/backend
    buildCommand: pip install -r requirements.txt
    startCommand: python app.py
    autoDeploy: true
    envVars:
      - key: FLASK_ENV
        value: production
      - key: FLASK_DEBUG
        value: "false"
      - key: SECRET_KEY
        sync: false
      - key: JWT_SECRET_KEY
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: CORS_SUPPORTS_CREDENTIALS
        value: "false"
      - key: ALLOW_PUBLIC_REGISTRATION
        value: "false"
      - key: ALLOW_DEMO_DATA
        value: "false"
      - key: OPENAI_API_KEY
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_USER_ID
        sync: false
      - key: DATABASE_URL
        value: sqlite:///ai_agent_system.db
